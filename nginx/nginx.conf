# ============================================================
# DevSchool Pro — Nginx Main Configuration
# ============================================================
# This is the MASTER Nginx that sits in front of everything.
# It routes traffic to the correct container:
#
#   Browser → Nginx:80 → /api/* → Backend:4000
#                       → /*    → Frontend:80
#
# Security: HSTS, CSP, XSS protection, clickjacking prevention
# Performance: Gzip, static caching, connection keepalive
# ============================================================

# Run as nginx user (security)
user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # ── Performance ────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;  # Max upload size

    # ── Gzip Compression ──────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        image/svg+xml;

    # ── Rate Limiting (Nginx Level — safety net) ──────────
    # 10 requests/sec per IP for API
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    # 30 requests/sec per IP for static content
    limit_req_zone $binary_remote_addr zone=static_limit:10m rate=30r/s;

    # ── Upstream Definitions ──────────────────────────────
    upstream backend_api {
        server backend:4000;
        keepalive 32;
    }

    upstream frontend_app {
        server frontend:80;
    }

    # ── Server Block ──────────────────────────────────────
    server {
        listen 80;
        server_name localhost;
        # For production with domain:
        # server_name devschool.pro www.devschool.pro;

        # ── Security Headers ──────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # ── API Routes → Backend ──────────────────────────
        # All /api/* requests go to Express backend
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Connection "";

            # Timeouts for AI endpoints (Gemini can be slow)
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # ── Health Check → Backend ────────────────────────
        location /health {
            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            access_log off;  # Don't log health checks
        }

        # ── Uploaded Files ────────────────────────────────
        location /uploads/ {
            alias /var/www/uploads/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # ── Frontend (React SPA) → Everything Else ────────
        location / {
            limit_req zone=static_limit burst=50 nodelay;

            proxy_pass http://frontend_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";
        }

        # ── Block Common Attack Paths ─────────────────────
        location ~ /\.(git|env|htaccess) {
            deny all;
            return 404;
        }

        location ~ /(wp-admin|wp-login|phpmyadmin) {
            deny all;
            return 404;
        }
    }

    # ── HTTPS Server (Uncomment when SSL certs are ready) ─
    # server {
    #     listen 443 ssl http2;
    #     server_name devschool.pro www.devschool.pro;
    #
    #     ssl_certificate /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_prefer_server_ciphers on;
    #     ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    #
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    #
    #     # Same location blocks as above...
    # }

    # Include additional configs
    include /etc/nginx/conf.d/*.conf;
}
