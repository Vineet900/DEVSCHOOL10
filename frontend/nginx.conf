# Frontend Nginx config for SPA (Single Page Application)
# Handles client-side routing — all routes serve index.html

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — React Router handles all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (they have hashes in filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Disable caching for index.html (always get latest version)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
